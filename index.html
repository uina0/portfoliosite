<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio site</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <!-- header -->
    <header class="header">
      <div class="container">
        <h1 class="logo">
          <img src="img/logo-yuina.svg" alt="yuina" />
        </h1>
        <nav class="nav">
          <ul>
            <li>profile</li>
            <li>skill</li>
            <li>works</li>
            <li>contact</li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- main -->
    <main>
      <!--about-->
      <section class="about">
        <div class="container">
          <div class="about-inner">
            <img src="img/about-1.jpg" alt="" />
            <div class="about-text">
              <h2>about</h2>
              <p>自己紹介テキスト</p>
            </div>
          </div>
        </div>
      </section>

      <!-- skill -->
      <section class="skill">
        <div class="container">
          <h2>skill</h2>
          <div class="skill-list">
            <div class="card">design</div>
            <div class="card"></div>
          </div>
        </div>
      </section>

      <!-- works -->
      <section class="works">
        <div class="container">
          <h2>works</h2>
          <div class="works-list">
            <div class="works-item">
              <img src="" alt="" />
              <p>タイトル</p>
            </div>

            <div class="works-item">
              <img src="" alt="" />
              <p>タイトル</p>
            </div>
          </div>
        </div>
      </section>

      <!-- footer -->
      <footer class="footer">
        <div class="container">
          <div class="logo">
            <img src="img/logo-yuina.svg" alt="yuina" />
          </div>
          <nav class="nav">
            <ul>
              <li>profile</li>
              <li>skill</li>
              <li>works</li>
              <li>contact</li>
            </ul>
          </nav>
          <p>© 2026</p>
        </div>
      </footer>
    </main>
  </body>
</html>
