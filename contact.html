<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>profile page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <!-- header -->
    <header class="header">
      <div class="container">
        <h1 class="logo">
          <a href="index.html">
            <img src="img/logo-yuina.svg" alt="yuina" />
          </a>
        </h1>
        <nav class="nav">
          <ul>
            <li><a href="profile.html">profile</a></li>
            <li><a href="index.html#skill">skill</a></li>
            <li><a href="index.html#works">works</a></li>
            <li><a href="contact.html">contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="contact">
        <div class="container">
          <div class="contact-wrap">
            <img src="img/contact-back.png" alt="" class="contact-bg" />
            <form class="contact-form" action="">
              <h2>お問い合わせフォーム</h2>
              <p>
                <label for="name">お名前*</label>
                <input type="text" id="name" required />
              </p>
              <p>
                <label for="email">メールアドレス*</label>
                <input type="email" id="email" required />
              </p>
              <p>
                <label for="message">お問い合わせ内容*</label>
                <textarea id="message" required></textarea>
              </p>
              <button>送信</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-top">
          <img src="img/footer-back.png" alt="" class="footer-bg" />
          <a href="contact.html" class="contact-btn">お問い合わせ</a>

          <div class="footer-bottom">
            <div class="logo">
              <a href="index.html">
                <img src="img/logo-yuina.svg" alt="yuina" />
              </a>
            </div>
            <nav class="nav">
              <ul>
                <li><a href="profile.html">profile</a></li>
                <li><a href="index.html#skill">skill</a></li>
                <li><a href="index.html#works">works</a></li>
                <li><a href="contact.html">contact</a></li>
              </ul>
            </nav>
          </div>
        </div>
        <p>© 2026</p>
      </div>
    </footer>
  </body>
</html>
